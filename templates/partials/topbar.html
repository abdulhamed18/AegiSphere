<header class="h-14 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center justify-between flex-shrink-0">
    <!-- Left: Page title -->
    <div>
        <h1 class="text-sm font-medium text-zinc-100">{{ page_title|default:"Dashboard" }}</h1>
    </div>

    <!-- Right: Workspace switcher + User -->
    <div class="flex items-center gap-4">
        {% if user.is_authenticated and user_workspaces %}
        <!-- Workspace Switcher -->
        <div class="relative" id="ws-switcher-container">
            <button id="ws-switcher-btn"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-md text-xs text-zinc-400 bg-zinc-800 border border-zinc-700 hover:bg-zinc-750 hover:text-zinc-200 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
                </svg>
                <span class="max-w-[120px] truncate">{{ active_workspace.name|default:"Workspace" }}</span>
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </button>
            <div id="ws-switcher-dropdown"
                 class="hidden absolute right-0 top-full mt-1 w-56 bg-zinc-900 border border-zinc-800 rounded-md shadow-sm z-50 py-1 max-h-64 overflow-y-auto">
                {% for ws in user_workspaces %}
                <form method="post" action="{% url 'switch_workspace' ws.pk %}">
                    {% csrf_token %}
                    <button type="submit"
                            class="w-full text-left px-3 py-2 text-xs transition-colors
                                   {% if active_workspace.pk == ws.pk %}bg-zinc-800 text-zinc-100 font-medium{% else %}text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200{% endif %}">
                        <span class="block truncate">{{ ws.name }}</span>
                        <span class="block text-xs text-zinc-500 mt-0.5">{{ ws.workspace_type }}</span>
                    </button>
                </form>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <!-- User -->
        {% if user.is_authenticated %}
        <div class="flex items-center gap-2">
            <span class="text-xs text-zinc-400">{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="text-xs text-zinc-500 hover:text-zinc-300 transition-colors cursor-pointer">Logout</button>
            </form>
        </div>
        {% endif %}
    </div>
</header>

<script>
(function() {
    var btn = document.getElementById('ws-switcher-btn');
    var dropdown = document.getElementById('ws-switcher-dropdown');
    if (!btn || !dropdown) return;

    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
    });

    document.addEventListener('click', function(e) {
        var container = document.getElementById('ws-switcher-container');
        if (container && !container.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
})();
</script>
