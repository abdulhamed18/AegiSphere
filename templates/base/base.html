{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AegiSphere — Enterprise Security Operations Center">
    <title>{% block title %}{{ page_title|default:"AegiSphere" }} — AegiSphere{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'dist/output.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-zinc-950 text-zinc-200 antialiased">
    {% block body %}{% endblock %}
    <script src="{% static 'src/js/toast.js' %}"></script>
    <script src="{% static 'src/js/modal.js' %}"></script>
    <script src="{% static 'src/js/tabs.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
