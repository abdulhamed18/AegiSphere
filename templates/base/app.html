{% extends "base/base.html" %}

{% block body %}
<div class="flex h-screen overflow-hidden">
    {% include "partials/sidebar.html" %}
    <div class="flex-1 flex flex-col min-w-0">
        {% include "partials/topbar.html" %}
        <main class="flex-1 overflow-y-auto p-6 bg-zinc-950">
            {% if messages %}
            <script id="django-messages-data" type="application/json">
                [{% for message in messages %}{"message": "{{ message|escapejs }}", "tags": "{{ message.tags }}"}{% if not forloop.last %}, {% endif %}{% endfor %}]
            </script>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
